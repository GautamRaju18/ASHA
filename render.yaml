# Render Blueprint for the ASHA Sahayak backend (FastAPI).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Secrets (sync: false) are NOT stored here — set them in the Render dashboard.
services:
  - type: web
    name: asha-sahayak-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: ASHA_USE_DENSE
        value: "0"
      - key: ASHA_LLM_TIMEOUT
        value: "45"

      # --- LLM: Gemini primary, OpenRouter free models as fallback ---
      - key: ASHA_LLM_PROVIDER
        value: gemini
      - key: ASHA_GEMINI_MODELS
        value: "gemini-3.5-flash,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-3-pro-preview"
      - key: ASHA_OPENROUTER_MODELS
        value: "nvidia/nemotron-3-super-120b-a12b:free,poolside/laguna-m.1:free,google/gemma-4-26b-a4b-it:free"

      # --- Secrets: set these in the Render dashboard (sync: false) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
